services:
  - type: web
    name: ha-ce-lsma-bot
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MODE
        value: production
      - key: DELTA_API_KEY
        sync: false
      - key: DELTA_API_SECRET
        sync: false
      - key: DELTA_BASE_URL
        value: https://api.india.delta.exchange
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: RENDER_APP_URL
        # Set this to your actual render URL after deployment
        value: https://ha-ce-lsma-bot.onrender.com
